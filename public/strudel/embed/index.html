/* Volume offset system: the slider acts as a multiplier on top of the hand-gesture base.
   When hands are active, effective volume = handsBase * sliderValue.
   When hands are off (handsBase=1), slider works normally. */
var __handsBaseVol = 1;
var __sliderVol = 1;
Object.defineProperty(window, '__strudelVolume', {
  get: function() { return __handsBaseVol * __sliderVol; },
  set: function(v) { __sliderVol = typeof v === 'number' ? v : 1; },
  configurable: true,
  enumerable: true
});

window.addEventListener('message', function(event) {
  if (!event.data) return;
  var type = event.data.type;
  if (type === 'strudel:setCode') {
    var code = event.data.code;
    var autoRun = event.data.autoRun !== false;
    if (typeof code !== 'string') return;
    function tryInject(retries) {
      var mirror = window.strudelMirror;
      if (mirror) {
        mirror.setCode(code);
        if (autoRun) mirror.evaluate();
        window.parent.postMessage({ type: 'strudel:codeSet', success: true }, '*');
      } else if (retries > 0) {
        setTimeout(function() { tryInject(retries - 1); }, 200);
      }
    }
    tryInject(15);
  } else if (type === 'strudel:play') {
    var mirror = window.strudelMirror;
    if (mirror) mirror.evaluate();
  } else if (type === 'strudel:stop') {
    var mirror = window.strudelMirror;
    if (mirror) mirror.stop();
  } else if (type === 'strudel:setParams') {
    if (typeof event.data.volume === 'number')
      __handsBaseVol = Math.max(0, Math.min(1.5, event.data.volume));
    if (typeof event.data.cps === 'number' && window.strudelMirror && window.strudelMirror.repl)
      window.strudelMirror.repl.setCps(Math.max(0.1, Math.min(3, event.data.cps)));
  }
});
// Heartbeat: send Strudel state to parent every 1s
setInterval(function() {
  var mirror = window.strudelMirror;
  if (!mirror) return;
  var repl = mirror.repl;
  var cps = repl && repl.scheduler ? repl.scheduler.cps : (repl ? repl.cps : null);
  var state = {
    type: 'strudel:heartbeat',
    code: mirror.code || null,
    cps: typeof cps === 'number' ? cps : null,
    bpm: typeof cps === 'number' ? cps * 120 : null,
    isPlaying: Boolean(mirror.started),
    timestamp: Date.now()
  };
  window.parent.postMessage(state, '*');
}, 1000);
/* Hide the in-bar AI prompt input and AI Run button */
function hideBarAI(retries) {
  var input = document.querySelector('input[placeholder*="Prompt Gemini"]');
  if (input) {
    input.style.display = 'none';
    var btn = input.nextElementSibling;
    if (btn && btn.tagName === 'BUTTON') btn.style.display = 'none';
    var errSpan = btn && btn.nextElementSibling;
    if (errSpan && errSpan.tagName === 'SPAN') errSpan.style.display = 'none';
  } else if (retries > 0) {
    setTimeout(function() { hideBarAI(retries - 1); }, 300);
  }
}
hideBarAI(20);
/* Rename "Vol" label to "Offset" */
function renameVol(retries) {
  var spans = document.querySelectorAll('span');
  for (var i = 0; i < spans.length; i++) {
    if (spans[i].textContent.trim() === 'Vol') {
      spans[i].textContent = 'Vol Offset';
      return;
    }
  }
  if (retries > 0) setTimeout(function() { renameVol(retries - 1); }, 300);
}
renameVol(20);
